<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="weather.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="bgcontainer">

        <div class="container">


            <!-- weather search items -->
            <div class="weatherheader">
                <form class="weathersearch">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input class="cityname" type="text" placeholder="Search your city" spellcheck="false">
                </form>
            </div>



            <!-- weathermain body -->
            <div class="weatherbody">
                <h1 class="weathercity">landon , united kingdom</h1>
                <p class="weatherdateandtime">feb 2026 </p>
                <div class="weatherdate">
                    <p class="weatherforecast">CLUD</p>
                    <div class="weathericon"><i class="fa-solid fa-cloud"></i> </div>
                </div>
                <p class="weathertemperature">256&#176</p>

                <div class="weatherminmax">
                    <p class="weathermin">min:-223&#176</p>
                    <p class="weathermax">max:-224&#176</p>
                </div>
            </div>

            <!-- weather search items -->
            <section class="weatherotherinfo">

                <div class="weathercard">
                    <i class="fa-solid fa-droplet"></i>
                    <div>
                        <p>feels like</p>
                        <p class="weatherfeelslike">15&#176</p>
                    </div>
                </div>

                <div class="weathercard">
                    <i class="fa-solid fa-hot-tub-person"></i>
                    <div>
                        <p>humidity</p>
                        <p class="humidity">15&#176</p>
                    </div>
                </div>

                <div class="weathercard">
                    <i class="fa-solid fa-wind"></i>
                    <div>
                        <p>wind</p>
                        <p class="wind">15&#176</p>
                    </div>
                </div>
                <div class="weathercard">
                    <i class="fa-solid fa-ring"></i>
                    <div>
                        <p>pressure</p>
                        <p class="pressure">15&#176</p>
                    </div>
                </div>



            </section>

        </div>








    </div>







    <script src="weather2.0.js"></script>

</body>

</html>
